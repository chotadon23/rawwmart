<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RAWWMART — Supplier Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #1DB954; --dark: #0F0F0F; --card: #181818;
    --card2: #1E1E1E; --muted: #888; --white: #FFFFFF;
    --orange: #FF5C1A; --border: rgba(255,255,255,0.09);
    --font-display: 'Archivo Black', sans-serif;
    --font-body: 'Outfit', sans-serif;
  }
  body { background: var(--dark); color: var(--white); font-family: var(--font-body); min-height: 100vh; }

  /* NAV */
  nav { display: flex; align-items: center; justify-content: space-between; padding: 16px 28px; background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
  .logo { font-family: var(--font-display); font-size: 1.3rem; letter-spacing: -1px; color: var(--white); text-decoration: none; }
  .logo span { color: var(--orange); }
  .nav-right { display: flex; align-items: center; gap: 16px; }
  .user-name { font-size: 0.88rem; color: var(--muted); }
  .supplier-badge { background: rgba(29,185,84,0.12); border: 1px solid rgba(29,185,84,0.25); color: var(--green); padding: 4px 12px; border-radius: 20px; font-size: 0.78rem; font-weight: 600; }
  .logout-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 7px 16px; border-radius: 20px; font-family: var(--font-body); font-size: 0.82rem; cursor: pointer; transition: all 0.2s; }
  .logout-btn:hover { border-color: var(--orange); color: var(--orange); }

  /* MAIN */
  .main { max-width: 960px; margin: 0 auto; padding: 36px 24px; }

  .welcome { margin-bottom: 32px; }
  .welcome h1 { font-family: var(--font-display); font-size: 1.8rem; letter-spacing: -1px; margin-bottom: 6px; }
  .welcome p  { color: var(--muted); font-size: 0.95rem; font-weight: 300; }

  /* STATS */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 32px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; }
  .stat-num { font-family: var(--font-display); font-size: 1.6rem; color: var(--white); }
  .stat-num.green  { color: var(--green); }
  .stat-num.orange { color: var(--orange); }
  .stat-label { font-size: 0.82rem; color: var(--muted); margin-top: 4px; }

  /* TABS */
  .tabs { display: flex; background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 6px; gap: 6px; margin-bottom: 24px; width: fit-content; }
  .tab { padding: 9px 22px; border-radius: 10px; font-size: 0.88rem; font-weight: 500; cursor: pointer; color: var(--muted); transition: all 0.2s; position: relative; }
  .tab.active { background: var(--green); color: white; }
  .tab .badge { position: absolute; top: -4px; right: -4px; background: var(--orange); color: white; width: 18px; height: 18px; border-radius: 50%; font-size: 0.65rem; display: flex; align-items: center; justify-content: center; font-weight: 700; }

  /* SECTION */
  .section-title { font-family: var(--font-display); font-size: 1.1rem; letter-spacing: -0.5px; margin-bottom: 16px; }

  /* ORDER CARD */
  .order-card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 24px; margin-bottom: 14px; transition: border-color 0.2s; }
  .order-card:hover { border-color: rgba(29,185,84,0.3); }
  .order-card.pending  { border-left: 3px solid #FBBF24; }
  .order-card.accepted { border-left: 3px solid var(--green); }
  .order-card.preparing { border-left: 3px solid #60A5FA; }
  .order-card.out_for_delivery { border-left: 3px solid var(--orange); }
  .order-card.delivered { border-left: 3px solid var(--green); opacity: 0.7; }
  .order-card.rejected  { border-left: 3px solid #F87171; opacity: 0.6; }

  .order-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; flex-wrap: wrap; gap: 10px; }
  .vendor-info h3 { font-size: 1rem; font-weight: 600; margin-bottom: 3px; }
  .vendor-info p  { font-size: 0.82rem; color: var(--muted); }
  .order-meta { text-align: right; }
  .order-time { font-size: 0.78rem; color: var(--muted); margin-bottom: 6px; }

  .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.78rem; font-weight: 600; }
  .status-pending      { background: rgba(250,204,21,0.12); color: #FBBF24; }
  .status-accepted     { background: rgba(29,185,84,0.12); color: var(--green); }
  .status-preparing    { background: rgba(59,130,246,0.12); color: #60A5FA; }
  .status-out_for_delivery { background: rgba(255,92,26,0.12); color: var(--orange); }
  .status-delivered    { background: rgba(29,185,84,0.12); color: var(--green); }
  .status-rejected     { background: rgba(239,68,68,0.12); color: #F87171; }

  .order-items { background: var(--card2); border-radius: 10px; padding: 14px; margin-bottom: 14px; }
  .order-items h4 { font-size: 0.8rem; color: var(--muted); margin-bottom: 8px; font-weight: 400; text-transform: uppercase; letter-spacing: 0.5px; }
  .item-row-display { display: flex; justify-content: space-between; font-size: 0.88rem; padding: 5px 0; border-bottom: 1px solid var(--border); }
  .item-row-display:last-child { border-bottom: none; }
  .item-row-display span { color: var(--muted); }

  .delivery-info { font-size: 0.85rem; color: var(--muted); margin-bottom: 6px; }
  .delivery-info strong { color: var(--white); }
  .notes-info { font-size: 0.82rem; color: var(--muted); font-style: italic; margin-bottom: 16px; }

  /* ACTION BUTTONS */
  .order-actions { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn-accept  { flex: 1; min-width: 120px; padding: 11px; background: var(--green); border: none; border-radius: 10px; color: white; font-family: var(--font-body); font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
  .btn-accept:hover { opacity: 0.85; }
  .btn-reject  { flex: 1; min-width: 100px; padding: 11px; background: transparent; border: 1px solid rgba(239,68,68,0.4); border-radius: 10px; color: #F87171; font-family: var(--font-body); font-size: 0.88rem; cursor: pointer; transition: background 0.2s; }
  .btn-reject:hover { background: rgba(239,68,68,0.08); }
  .btn-status  { flex: 2; min-width: 160px; padding: 11px; background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.3); border-radius: 10px; color: #60A5FA; font-family: var(--font-body); font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  .btn-status:hover { background: rgba(59,130,246,0.25); }
  .btn-delivered { flex: 2; padding: 11px; background: rgba(29,185,84,0.15); border: 1px solid rgba(29,185,84,0.3); border-radius: 10px; color: var(--green); font-family: var(--font-body); font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  .btn-delivered:hover { background: rgba(29,185,84,0.25); }

  /* EMPTY STATE */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-icon  { font-size: 3rem; margin-bottom: 14px; }
  .empty-state p { font-size: 0.9rem; line-height: 1.6; }

  /* NOTIFICATION BELL */
  .notif-bar { background: rgba(29,185,84,0.08); border: 1px solid rgba(29,185,84,0.2); border-radius: 14px; padding: 14px 20px; margin-bottom: 24px; display: flex; align-items: center; gap: 12px; font-size: 0.88rem; }
  .notif-dot { width: 10px; height: 10px; background: var(--green); border-radius: 50%; animation: pulse 1.5s infinite; flex-shrink: 0; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.4)} }

  .toast { display: none; position: fixed; bottom: 28px; right: 28px; padding: 14px 22px; border-radius: 12px; font-size: 0.9rem; font-weight: 500; z-index: 300; animation: slideUp 0.3s ease; }
  .toast.green  { background: var(--green); color: white; }
  .toast.red    { background: #EF4444; color: white; }
  .toast.blue   { background: #3B82F6; color: white; }
  @keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }

  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 6px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .refresh-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 7px 14px; border-radius: 10px; font-family: var(--font-body); font-size: 0.82rem; cursor: pointer; margin-left: auto; display: block; margin-bottom: 16px; transition: all 0.2s; }
  .refresh-btn:hover { border-color: var(--green); color: var(--green); }

  @media(max-width:600px) {
    .stats { grid-template-columns: 1fr 1fr; }
    .order-head { flex-direction: column; }
    .order-meta { text-align: left; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">RAWW<span>MART</span></a>
  <div class="nav-right">
    <span class="supplier-badge">Supplier</span>
    <span class="user-name" id="nav-username"></span>
    <button class="logout-btn" onclick="logout()">Log out</button>
  </div>
</nav>

<div class="main">

  <div class="welcome">
    <h1 id="welcome-msg">Supplier Dashboard 🏭</h1>
    <p>Manage incoming orders from nearby vendors.</p>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-num" id="stat-pending">0</div>
      <div class="stat-label">Pending orders</div>
    </div>
    <div class="stat-card">
      <div class="stat-num green" id="stat-active">0</div>
      <div class="stat-label">Active orders</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-delivered">0</div>
      <div class="stat-label">Delivered today</div>
    </div>
    <div class="stat-card">
      <div class="stat-num orange" id="stat-total">0</div>
      <div class="stat-label">Total orders</div>
    </div>
  </div>

  <!-- NOTIFICATION BAR -->
  <div class="notif-bar">
    <div class="notif-dot"></div>
    <span>You are <strong style="color:var(--green)">live</strong> — vendors within 10 km can see your profile and place orders.</span>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab('incoming')" id="tab-incoming">
      Incoming
      <div class="badge" id="pending-badge" style="display:none;">0</div>
    </div>
    <div class="tab" onclick="switchTab('active')" id="tab-active">Active</div>
    <div class="tab" onclick="switchTab('history')" id="tab-history">History</div>
  </div>

  <button class="refresh-btn" onclick="loadOrders()">↻ Refresh orders</button>

  <!-- ORDERS LIST -->
  <div id="orders-container"></div>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  const user  = JSON.parse(localStorage.getItem('user') || '{}');
  const token = localStorage.getItem('token');

  if (!token || !user.id) window.location.href = 'supplier-login.html';

  document.getElementById('welcome-msg').textContent  = `Welcome, ${user.name || 'Supplier'}! 🏭`;
  document.getElementById('nav-username').textContent = user.name || '';

  let currentTab = 'incoming';
  let allOrders  = [];

  // ── Demo orders for display when no real orders exist ──
  const demoOrders = [
    {
      _id: 'ord1',
      status: 'pending',
      createdAt: new Date().toISOString(),
      vendor: { name: 'Ramesh Chaat Stall', mobile: '9876543210' },
      items: [{ name: 'Onions', quantity: 10, unit: 'kg' }, { name: 'Tomatoes', quantity: 5, unit: 'kg' }],
      deliveryAddress: 'Stall 7, Shivaji Market, Pune',
      notes: 'Please deliver before 8am'
    },
    {
      _id: 'ord2',
      status: 'accepted',
      createdAt: new Date(Date.now() - 3600000).toISOString(),
      vendor: { name: 'Meera Tea Shop', mobile: '9823456789' },
      items: [{ name: 'Milk', quantity: 20, unit: 'litre' }, { name: 'Sugar', quantity: 3, unit: 'kg' }],
      deliveryAddress: 'Shop 12, FC Road, Pune',
      notes: ''
    },
    {
      _id: 'ord3',
      status: 'delivered',
      createdAt: new Date(Date.now() - 86400000).toISOString(),
      vendor: { name: 'Suresh Poha Corner', mobile: '9765432100' },
      items: [{ name: 'Poha', quantity: 25, unit: 'kg' }, { name: 'Oil', quantity: 5, unit: 'litre' }],
      deliveryAddress: 'Dattwadi Market, Pune',
      notes: 'Urgent delivery needed'
    }
  ];

  // ── Switch tabs ──
  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    renderOrders();
  }

  // ── Load orders from backend ──
  async function loadOrders() {
    try {
      const res = await fetch('/api/orders/incoming', {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (res.ok) {
        const data = await res.json();
        allOrders = data.orders && data.orders.length > 0 ? data.orders : demoOrders;
      } else {
        allOrders = demoOrders;
      }
    } catch {
      allOrders = demoOrders;
    }
    renderOrders();
    updateStats();
  }

  // ── Render orders based on current tab ──
  function renderOrders() {
    const container = document.getElementById('orders-container');
    let filtered = [];

    if (currentTab === 'incoming') {
      filtered = allOrders.filter(o => o.status === 'pending');
    } else if (currentTab === 'active') {
      filtered = allOrders.filter(o => ['accepted','preparing','out_for_delivery'].includes(o.status));
    } else {
      filtered = allOrders.filter(o => ['delivered','rejected'].includes(o.status));
    }

    if (filtered.length === 0) {
      const msgs = {
        incoming: { icon: '🔔', text: 'No pending orders right now. Vendors nearby will send orders to you soon.' },
        active:   { icon: '📦', text: 'No active orders at the moment.' },
        history:  { icon: '📋', text: 'No completed orders yet.' }
      };
      const m = msgs[currentTab];
      container.innerHTML = `<div class="empty-state"><div class="empty-icon">${m.icon}</div><p>${m.text}</p></div>`;
      return;
    }

    container.innerHTML = filtered.map(o => buildOrderCard(o)).join('');
  }

  // ── Build a single order card ──
  function buildOrderCard(o) {
    const timeAgo = getTimeAgo(o.createdAt);
    const itemsHtml = o.items.map(i => `
      <div class="item-row-display">
        <strong>${i.name}</strong>
        <span>${i.quantity} ${i.unit}</span>
      </div>
    `).join('');

    let actionsHtml = '';
    if (o.status === 'pending') {
      actionsHtml = `
        <div class="order-actions">
          <button class="btn-accept" onclick="updateOrder('${o._id}', 'accept')">✓ Accept Order</button>
          <button class="btn-reject" onclick="updateOrder('${o._id}', 'reject')">✗ Reject</button>
        </div>`;
    } else if (o.status === 'accepted') {
      actionsHtml = `
        <div class="order-actions">
          <button class="btn-status" onclick="updateStatus('${o._id}', 'preparing')">🔧 Mark as Preparing</button>
        </div>`;
    } else if (o.status === 'preparing') {
      actionsHtml = `
        <div class="order-actions">
          <button class="btn-status" onclick="updateStatus('${o._id}', 'out_for_delivery')">🚚 Mark Out for Delivery</button>
        </div>`;
    } else if (o.status === 'out_for_delivery') {
      actionsHtml = `
        <div class="order-actions">
          <button class="btn-delivered" onclick="updateStatus('${o._id}', 'delivered')">✅ Mark as Delivered</button>
        </div>`;
    }

    return `
      <div class="order-card ${o.status}" id="card-${o._id}">
        <div class="order-head">
          <div class="vendor-info">
            <h3>📍 ${o.vendor?.name || 'Vendor'}</h3>
            <p>📞 ${o.vendor?.mobile || ''}</p>
          </div>
          <div class="order-meta">
            <div class="order-time">${timeAgo}</div>
            <span class="status-badge status-${o.status}">${statusLabel(o.status)}</span>
          </div>
        </div>
        <div class="order-items">
          <h4>Items ordered</h4>
          ${itemsHtml}
        </div>
        <div class="delivery-info">📦 Deliver to: <strong>${o.deliveryAddress}</strong></div>
        ${o.notes ? `<div class="notes-info">💬 Note: "${o.notes}"</div>` : ''}
        ${actionsHtml}
      </div>
    `;
  }

  // ── Accept or Reject order ──
  async function updateOrder(orderId, action) {
    try {
      const res = await fetch(`/api/orders/${orderId}/${action}`, {
        method: 'PUT',
        headers: { 'Authorization': `Bearer ${token}` }
      });

      if (res.ok) {
        await loadOrders();
        showToast(action === 'accept' ? '✓ Order accepted!' : '✗ Order rejected.', action === 'accept' ? 'green' : 'red');
      } else {
        // Demo mode
        demoUpdateOrder(orderId, action === 'accept' ? 'accepted' : 'rejected');
        showToast(action === 'accept' ? '✓ Order accepted!' : '✗ Order rejected.', action === 'accept' ? 'green' : 'red');
      }
    } catch {
      demoUpdateOrder(orderId, action === 'accept' ? 'accepted' : 'rejected');
      showToast(action === 'accept' ? '✓ Order accepted!' : '✗ Order rejected.', action === 'accept' ? 'green' : 'red');
    }
  }

  // ── Update order status ──
  async function updateStatus(orderId, status) {
    try {
      const res = await fetch(`/api/orders/${orderId}/status`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ status })
      });

      if (res.ok) {
        await loadOrders();
      } else {
        demoUpdateOrder(orderId, status);
      }
    } catch {
      demoUpdateOrder(orderId, status);
    }

    const labels = { preparing:'🔧 Order is being prepared!', out_for_delivery:'🚚 Order is out for delivery!', delivered:'✅ Order delivered successfully!' };
    showToast(labels[status] || 'Status updated!', status === 'delivered' ? 'green' : 'blue');
  }

  // ── Demo update (when no real backend) ──
  function demoUpdateOrder(orderId, newStatus) {
    const order = allOrders.find(o => o._id === orderId);
    if (order) order.status = newStatus;
    renderOrders();
    updateStats();
  }

  // ── Update stats ──
  function updateStats() {
    const pending   = allOrders.filter(o => o.status === 'pending').length;
    const active    = allOrders.filter(o => ['accepted','preparing','out_for_delivery'].includes(o.status)).length;
    const delivered = allOrders.filter(o => o.status === 'delivered').length;
    const total     = allOrders.length;

    document.getElementById('stat-pending').textContent   = pending;
    document.getElementById('stat-active').textContent    = active;
    document.getElementById('stat-delivered').textContent = delivered;
    document.getElementById('stat-total').textContent     = total;

    const badge = document.getElementById('pending-badge');
    if (pending > 0) { badge.style.display = 'flex'; badge.textContent = pending; }
    else { badge.style.display = 'none'; }
  }

  // ── Helpers ──
  function statusLabel(s) {
    const map = {
      pending: '⏳ Pending',
      accepted: '✓ Accepted',
      preparing: '🔧 Preparing',
      out_for_delivery: '🚚 Out for delivery',
      delivered: '✅ Delivered',
      rejected: '✗ Rejected'
    };
    return map[s] || s;
  }

  function getTimeAgo(dateStr) {
    const diff = Date.now() - new Date(dateStr).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 1)  return 'Just now';
    if (mins < 60) return `${mins} min ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24)  return `${hrs} hr ago`;
    return `${Math.floor(hrs/24)} day ago`;
  }

  function showToast(msg, type = 'green') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type}`;
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3500);
  }

  function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = 'index.html';
  }

  // Load on start and auto-refresh every 30 seconds
  loadOrders();
  setInterval(loadOrders, 30000);
</script>
</body>
</html>
